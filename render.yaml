services:
  - type: web
    name: fleet-management-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node scripts/init-db.js && node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fleet-management-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 24h
      - key: JWT_REFRESH_EXPIRE
        value: 7d
      - key: FRONTEND_URL
        value: https://fleet-management-frontend.onrender.com
      - key: CLIENT_URL
        value: https://fleet-management-frontend.onrender.com
      - key: DB_POOL_MAX
        value: 10
      - key: DB_POOL_MIN
        value: 2

  - type: web
    name: fleet-management-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://fleet-management-api.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://fleet-management-api.onrender.com

databases:
  - name: fleet-management-db
    databaseName: fleet_management
    plan: free
