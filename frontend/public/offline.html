<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e40af" />
    <title>Offline - Fleet Manager</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f8fafc;
        color: #1e293b;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 1rem;
      }
      .container { text-align: center; max-width: 400px; }
      .icon { width: 96px; height: 96px; margin: 0 auto 1.5rem; }
      h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
      p { color: #64748b; line-height: 1.6; margin-bottom: 1.5rem; }
      .btn {
        display: inline-block;
        padding: 0.75rem 2rem;
        background: #1e40af;
        color: #fff;
        border: none;
        border-radius: 0.5rem;
        font-size: 1rem;
        cursor: pointer;
        text-decoration: none;
      }
      .btn:hover { background: #1e3a8a; }
    </style>
  </head>
  <body>
    <div class="container">
      <svg class="icon" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="512" height="512" rx="64" fill="#1e40af"/>
        <rect x="64" y="128" width="288" height="192" rx="16" fill="#3b82f6" stroke="#fff" stroke-width="8"/>
        <rect x="64" y="256" width="384" height="96" rx="16" fill="#60a5fa" stroke="#fff" stroke-width="8"/>
        <rect x="384" y="192" width="64" height="64" rx="8" fill="#93c5fd" stroke="#fff" stroke-width="6"/>
        <circle cx="160" cy="400" r="40" fill="#fff" stroke="#1e40af" stroke-width="8"/>
        <circle cx="368" cy="400" r="40" fill="#fff" stroke="#1e40af" stroke-width="8"/>
        <rect x="96" y="88" width="192" height="40" rx="12" fill="#2563eb" stroke="#fff" stroke-width="6"/>
      </svg>
      <h1>You're Offline</h1>
      <p>Please check your internet connection and try again.</p>
      <button class="btn" onclick="window.location.reload()">Retry</button>
    </div>
  </body>
</html>
